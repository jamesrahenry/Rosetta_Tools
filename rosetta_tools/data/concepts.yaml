# concepts.yaml — Rosetta concept registry
# Updated: 2026-04-22 UTC
#
# Fields
# ------
# name               Canonical identifier (matches *_consensus_pairs.jsonl stem)
# category           epistemic | syntactic | relational | affective | security
# pipelines          Which analysis pipelines use this concept:
#                    caz   — CAZ/PRH extraction and alignment
#                    cia   — Concept Integrity Auditor (probe + adversarial)
# assembly_depth_pct Mean peak depth as % of model depth (from 22-model study; null = not yet measured)
# assembly_depth_std Cross-model standard deviation (null = not yet measured)
# notes              Exclusions, caveats, or dataset issues

concepts:

