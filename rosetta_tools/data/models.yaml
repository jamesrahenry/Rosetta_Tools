# models.yaml — Rosetta model registry
# Updated: 2026-04-22 UTC
#
# Fields
# ------
# model_id      HuggingFace repo ID
# family        Architecture family (pythia / gpt2 / opt / qwen2 / gemma2 / gemma4 /
#               llama3 / mistral / mixtral / phi / falcon)
# hidden_dim    Residual stream width
# n_layers      Number of transformer layers
# vram_bf16     Approximate bf16 VRAM in GB (used for scheduling)
# cluster       PRH zero-PCA cluster — models in the same cluster share hidden_dim
#               and can be Procrustes-aligned without PCA compression.
#               A=768, B=2048, C=4096, D=3584, E=5120, G=5376, F=8192, scale=ladder
#               null = not included in PRH sweep
# encoding      How representations evolve across layers:
#               redundant — older MHA (GPT-2, Pythia, OPT): features persist
#                           across many layers, high cross-layer cosine similarity
#               sparse    — modern GQA+SwiGLU (Qwen, Llama, Mistral, Gemma):
#                           representations change rapidly, fewer persistent features
# attention     mha | gqa | alternating
#               alternating = Gemma-2/4 sliding-window + global attention pattern;
#               Fisher peaks are MHA resonance artifacts, not semantic landmarks
# quantization  null | 4bit | 8bit — required to fit on available hardware
#               null  = fits bf16 on a single L4 (22GB)
#               4bit  = nf4 bitsandbytes required (Mixtral, large Qwen, Gemma4)
#               8bit  = H200-class only (70B+ models)
# enabled       Include in --prh-proxy / default sweep runs
# gated         Requires HF license acceptance before download
# tags          instruct, frontier, moe, scale, rlhf-pair
# notes         Architecture quirks, known issues, empirical observations

models:

